# Conda environment for running CHAMPAGNE off Biowulf (Windows/WSL2 or local
# Linux). This is the single source of truth for the host toolchain a new
# user needs. It also bundles Apptainer so real (non-stub) runs work with
# `-profile apptainer` without needing Docker Desktop -- see
# docs/guide/windows-wsl.md.
#
# Create and activate it from the repo root:
#
#   conda env create -f environment.yml
#   conda activate champagne
#
# The `pip: -e .` line installs the champagne CLI from this working tree, so the
# `champagne` command always runs the code you have checked out (no stale copy).
#
# Why coreutils is pinned here:
#   Ubuntu 25.10+ (and WSL images based on it) ship uutils coreutils by default.
#   Its `date` does not honor GNU's `%3N` millisecond format, which breaks
#   Nextflow's task wrapper (`nxf_date`) with "unbound variable" errors. Pulling
#   in GNU coreutils restores the behavior Nextflow and bioinformatics tools
#   expect. Harmless on distros that already use GNU coreutils.
#
# Why nextflow is pinned to the 25.10 line:
#   Nextflow 26.x enables the strict config parser by default, which rejects this
#   pipeline's config syntax (`outputDir is not defined`, etc.). This mirrors
#   manifest.nextflowVersion in nextflow.config. Installing nextflow from conda
#   here removes the need to `export NXF_VER=25.10.0` manually.
#
# Why apptainer is included:
#   Real runs execute each process inside a container. Apptainer runs rootless
#   (no Docker daemon / Docker Desktop needed) and Nextflow drives it via
#   `-profile apptainer`. On WSL2 it uses unprivileged user namespaces. Omit or
#   remove it if you prefer Docker/Docker Desktop instead.
name: champagne
channels:
  - conda-forge
  - bioconda
dependencies:
  - python >=3.11
  - pip
  - coreutils >=9.0
  - nextflow >=25.10.0,<26.0.0
  - apptainer >=1.3 # rootless containers for real runs (-profile apptainer)
  - graphviz # optional: lets Nextflow render the execution DAG
  - tree # used by spooker (run-usage logging) in workflow.onComplete
  - pip:
      - -e .
